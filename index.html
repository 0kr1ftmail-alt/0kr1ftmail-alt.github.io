<!DOCTYPE html>
<html>
<head>
    <title>DisneyNOW</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: black; }
        iframe { width: 100vw; height: 100vh; border: none; }
    </style>
</head>
<body>
    <!-- Use the /preview link here -->
    <iframe id="videoPlayer" 
            src="https://drive.google.com/file/d/1J_rF7oUSN3JGEXRIQlCjSGPqCrqsl4kz/preview" 
            allow="autoplay; fullscreen">
    </iframe>

    <script>
        // Note: Google Drive previews don't easily signal "onended" to outside code.
        // You may need to set a timer based on your video's length (e.g., 30000ms = 30s).
        setTimeout(function() {
            window.location.href = "https://disneynow.com";
        }, 16000); // Change 30000 to the length of your video in milliseconds
    </script>
</body>
</html>
