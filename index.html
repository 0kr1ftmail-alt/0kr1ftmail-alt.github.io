<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Intro</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  #startScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    cursor: pointer;
  }

  #startScreen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
</style>
</head>

<body>

<div id="startScreen" onclick="startIntro()">
  <img src="disneynow.png">
</div>

<video id="introVideo" playsinline preload="auto">
  <source src="intro.mp4" type="video/mp4">
</video>

<script>
function startIntro() {
  const screen = document.getElementById('startScreen');
  const video = document.getElementById('introVideo');

  screen.style.display = 'none';
  video.style.display = 'block';

  video.muted = false;

  const playPromise = video.play();

  if (playPromise !== undefined) {
    playPromise.catch(error => {
      console.log("Playback failed:", error);
      alert("Tap again to play");
    });
  }

  video.onended = () => {
    window.location.href = "https://disneynow.com";
  };
}
</script>

</body>
</html>
