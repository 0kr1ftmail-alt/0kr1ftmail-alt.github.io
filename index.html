<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DisneyNOW</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  #startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }

  #startScreen img {
    width: 60%;
    max-width: 400px;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
</style>
</head>

<body>

<!-- Splash Image -->
<div id="startScreen" onclick="startIntro()">
  <img src="disneynow.png" alt="DisneyNOW">
</div>

<!-- Video -->
<video id="introVideo" playsinline>
  <source src="intro.mp4" type="video/mp4">
</video>

<script>
function startIntro() {
  const screen = document.getElementById('startScreen');
  const video = document.getElementById('introVideo');

  // Hide splash screen
  screen.style.display = 'none';

  // Show video
  video.style.display = 'block';

  // Play with sound
  video.muted = false;
  video.play();

  // Redirect after video
  video.onended = () => {
    window.location.href = "https://disneynow.com";
  };
}
</script>

</body>
</html>
