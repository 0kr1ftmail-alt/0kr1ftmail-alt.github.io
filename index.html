<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Disney Intro</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  /* Splash screen */
  #startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: opacity 0.8s;
    z-index: 2;
  }

  #startScreen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Video */
  video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s;
    z-index: 1;
  }
</style>
</head>

<body>

<div id="startScreen">
  <img src="disneynow.png">
</div>

<video id="introVideo" playsinline preload="auto">
  <source src="intro.mp4" type="video/mp4">
</video>

<script>
const startScreen = document.getElementById('startScreen');
const video = document.getElementById('introVideo');

// Start on click
startScreen.addEventListener('click', startIntro);

function startIntro() {
  // Fade out splash
  startScreen.style.opacity = "0";

  setTimeout(() => {
    startScreen.style.display = "none";

    // Show video
    video.style.opacity = "1";

    // Ensure unmuted
    video.muted = false;

    // Try playing
    video.play().then(() => {
      console.log("Video playing");
    }).catch(err => {
      console.log("Play failed:", err);
      alert("Click again to start");
    });

  }, 800);
}

// Fade out at end
video.addEventListener('ended', () => {
  video.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "https://disneynow.com";
  }, 800);
});
</script>

</body>
</html>
