<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DisneyNOW</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: "Arial Rounded MT Bold", Arial, sans-serif;
  }

  /* Splash screen */
  #startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #001a33, #000000 70%);
    cursor: pointer;
    transition: opacity 0.8s;
    z-index: 2;
  }

  #startScreen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.95;
  }

  /* Video */
  video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s;
    z-index: 1;
  }

  /* DisneyNOW-style Skip Button */
  #skipBtn {
    position: fixed;
    bottom: 30px;
    right: 30px;

    padding: 12px 28px;
    font-size: 15px;
    letter-spacing: 1.5px;
    font-weight: bold;

    color: white;

    background: linear-gradient(
      145deg,
      rgba(0, 140, 255, 0.25),
      rgba(0, 0, 0, 0.6)
    );

    border: 2px solid rgba(0, 170, 255, 0.7);
    border-radius: 999px;

    backdrop-filter: blur(8px);

    cursor: pointer;
    z-index: 3;

    opacity: 0;
    display: none;

    /* Glow */
    box-shadow:
      0 0 8px rgba(0, 170, 255, 0.6),
      inset 0 0 6px rgba(0, 170, 255, 0.4);

    transition: all 0.25s ease;
  }

  /* Glow animation */
  @keyframes glowPulse {
    0% { box-shadow: 0 0 8px rgba(0,170,255,0.5); }
    50% { box-shadow: 0 0 16px rgba(0,170,255,0.9); }
    100% { box-shadow: 0 0 8px rgba(0,170,255,0.5); }
  }

  #skipBtn.show {
    opacity: 1;
    animation: glowPulse 2s infinite;
  }

  /* Hover */
  #skipBtn:hover {
    background: linear-gradient(
      145deg,
      rgba(0, 170, 255, 0.6),
      rgba(0, 0, 0, 0.8)
    );

    transform: scale(1.08);

    box-shadow:
      0 0 20px rgba(0,170,255,1),
      inset 0 0 10px rgba(0,170,255,0.7);
  }

  /* Click */
  #skipBtn:active {
    transform: scale(0.95);
  }

</style>
</head>

<body>

<!-- Splash -->
<div id="startScreen">
  <img src="disneynow.png">
</div>

<!-- Video -->
<video id="introVideo" playsinline preload="auto">
  <source src="intro.mp4" type="video/mp4">
</video>

<!-- Skip -->
<button id="skipBtn">SKIP</button>

<script>
const startScreen = document.getElementById('startScreen');
const video = document.getElementById('introVideo');
const skipBtn = document.getElementById('skipBtn');

startScreen.addEventListener('click', startIntro);

function startIntro() {
  startScreen.style.opacity = "0";

  setTimeout(() => {
    startScreen.style.display = "none";

    video.style.opacity = "1";
    video.muted = false;

    video.play().catch(() => {
      alert("Click again to start");
    });

    // Show skip button after delay
    setTimeout(() => {
      skipBtn.style.display = "block";
      setTimeout(() => {
        skipBtn.classList.add("show");
      }, 50);
    }, 1800);

  }, 800);
}

// Skip click
skipBtn.addEventListener('click', redirectNow);

// End video
video.addEventListener('ended', redirectNow);

function redirectNow() {
  video.style.opacity = "0";
  skipBtn.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "https://disneynow.com";
  }, 800);
}
</script>

</body>
</html>
