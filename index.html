<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Disney Intro</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  /* Splash screen */
  #startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    cursor: pointer;
    transition: opacity 0.8s;
    z-index: 2;
  }

  #startScreen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Video */
  video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s;
    z-index: 1;
  }

  /* DisneyNOW-style skip button */
  #skipBtn {
    position: fixed;
    bottom: 30px;
    right: 30px;

    padding: 12px 26px;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 1px;

    color: white;
    background: rgba(0, 0, 0, 0.5);

    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 50px;

    backdrop-filter: blur(6px);

    cursor: pointer;
    z-index: 3;

    /* Hidden initially */
    opacity: 0;
    display: none;

    /* Glow */
    box-shadow: 0 0 12px rgba(255,255,255,0.3);

    transition: all 0.3s ease;
  }

  /* Fade-in class */
  #skipBtn.show {
    opacity: 1;
  }

  /* Hover effect */
  #skipBtn:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: scale(1.05);
  }

  /* Click effect */
  #skipBtn:active {
    transform: scale(0.95);
  }

</style>
</head>

<body>

<!-- Splash -->
<div id="startScreen">
  <img src="disneynow.png">
</div>

<!-- Video -->
<video id="introVideo" playsinline preload="auto">
  <source src="intro.mp4" type="video/mp4">
</video>

<!-- Skip button -->
<button id="skipBtn">SKIP</button>

<script>
const startScreen = document.getElementById('startScreen');
const video = document.getElementById('introVideo');
const skipBtn = document.getElementById('skipBtn');

// Start intro
startScreen.addEventListener('click', startIntro);

function startIntro() {
  // Fade out splash
  startScreen.style.opacity = "0";

  setTimeout(() => {
    startScreen.style.display = "none";

    // Show video
    video.style.opacity = "1";

    // Ensure sound works
    video.muted = false;

    video.play().then(() => {
      console.log("Video playing");
    }).catch(err => {
      console.log("Playback failed:", err);
      alert("Click again to start");
    });

    // Show skip button after 2 seconds
    setTimeout(() => {
      skipBtn.style.display = "block";
      setTimeout(() => {
        skipBtn.classList.add("show");
      }, 50);
    }, 2000);

  }, 800);
}

// Skip button click
skipBtn.addEventListener('click', redirectNow);

// When video ends
video.addEventListener('ended', redirectNow);

function redirectNow() {
  // Fade out everything
  video.style.opacity = "0";
  skipBtn.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "https://disneynow.com";
  }, 800);
}
</script>

</body>
</html>
