<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DisneyNOW</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: sans-serif;
  }

  /* Splash screen */
  #startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: opacity 0.6s ease;
    z-index: 2;
  }

  #startScreen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Video */
  video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  /* Skip button */
  #skipBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 15px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    display: none;
    z-index: 3;
  }
</style>
</head>

<body>

<!-- Splash -->
<div id="startScreen">
  <img src="disneynow.png" alt="Tap to Start">
</div>

<!-- Video -->
<video id="introVideo" playsinline webkit-playsinline preload="auto">
  <source src="intro.mp4" type="video/mp4">
</video>

<button id="skipBtn">Skip</button>

<script>
const startScreen = document.getElementById('startScreen');
const video = document.getElementById('introVideo');
const skipBtn = document.getElementById('skipBtn');

let started = false;

function startIntro() {
  if (started) return;
  started = true;

  // Fade out splash
  startScreen.style.opacity = "0";

  setTimeout(() => {
    startScreen.style.display = "none";

    // Show video
    video.style.opacity = "1";
    skipBtn.style.display = "block";

    // IMPORTANT: must be triggered by user gesture
    video.muted = false;

    const playPromise = video.play();

    if (playPromise !== undefined) {
      playPromise.catch(() => {
        // fallback: force play again
        video.muted = false;
        video.play();
      });
    }

  }, 600);
}

// Handle tap/click (works on mobile + desktop)
document.body.addEventListener('click', startIntro);
document.body.addEventListener('touchstart', startIntro);

// Redirect when video ends
video.addEventListener('ended', () => {
  fadeAndRedirect();
});

// Skip button
skipBtn.onclick = fadeAndRedirect;

function fadeAndRedirect() {
  video.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "https://disneynow.com";
  }, 600);
}
</script>

</body>
</html>
